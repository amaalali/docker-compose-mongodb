services:
  mongodb:
    image: percona/percona-server-mongodb:7.0-multi
    container_name: mongodb
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - 27017:27017
    volumes:
      - mongodb:/data/db
    networks:
      - mongodb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s
      start_interval: 5s


  rs-init:
    image: percona/percona-server-mongodb:7.0-multi
    container_name: rs-init
    restart: "no"
    networks:
      - mongodb-network
    depends_on:
      mongodb:
        condition: service_healthy
        restart: true
    entrypoint:
      - /bin/sh
      - -c
      - mongosh --host mongodb:27017 --eval 'rs.initiate({_id:"rs0", members:[{_id:0, host:"mongodb:27017"}]});'

networks:
  mongodb-network:

volumes:
  mongo-data:
